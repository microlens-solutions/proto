name: Pipeline.yaml

on:
  push:
    tags:
      - 'v*'

jobs:
  pipeline:
    name: ⛓️ CI/CD Pipeline - Build, Pack, Release, Publish
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: write
      id-token: write
      
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: 🔄 Restore Dependencies
      run: dotnet restore

    - name: 🛠️ Build Solution
      run: dotnet build --configuration Release --no-restore

    - name: 🏷️ Extract Version
      id: get_version
      shell: bash
      run: |
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$TAG_VERSION" >> $GITHUB_OUTPUT
        else
          echo "VERSION=1.0.0-preview.${{ github.run_number }}" >> $GITHUB_OUTPUT
        fi

    - name: 📦 Pack Library
      run: |
        dotnet pack Microlens.Proto/Microlens.Proto.csproj --configuration Release --output ./dist -p:PackageVersion=${{ steps.get_version.outputs.VERSION }}

    - name: 🚚 Release to GitHub
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          * Compiled binary drop for version tag: `${{ github.ref_name }}`
          * Commit Reference: ${{ github.sha }}`
        files: ./dist/*.nupkg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 🔑 OIDC Login
      uses: NuGet/login@v1
      id: nuget_oidc
      with:
        user: ${{ secrets.NUGET_USERNAME }}
        
    - name: 🚀 Publish to NuGet
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        dotnet nuget push "./dist/*.nupkg" --api-key "${{ steps.nuget_oidc.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
